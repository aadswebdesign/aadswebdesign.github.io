<svg id='tbx_close' viewBox='0 0 28 28' xmlns='http://www.w3.org/2000/svg'>
	<defs>
		<filter id="shadow_1">
			<feDropShadow stdDeviation="0.2" dy="0.4" dx="0.2"/>
		</filter>
		<filter id='shadow_2' x='-50%' y='-50%' width='200%' height='200%' filterUnits='userSpaceOnUse'>
			<feDropShadow stdDeviation='0.2' dy='0.4' dx='0.2'/>
		</filter>
		<style>
			*:not(rect){ 
				border: 0.001rem solid transparent;
				height: 1.75rem;
				width: 1.75rem;
			}
			.base-style{
				fill: none;
				fill-rule:evenodd;
				stroke:#000000;
				stroke-width:2px;
				stroke-linecap:butt;
				stroke-linejoin:miter;
				stroke-opacity:1; 
			}
			.style-1{
				fill:#ffed3d;
				stroke:#b795a3;
				stroke-width:0.05px;
			}
			.style-2{
				stroke:#6d604c;
				stroke-width: 0.7px;
				filter:url(#shadow_2);
			}
			.style-3{
				fill:#dddddd;
				stroke:#342610;
				stroke-width:0.7px;
			}
			.style-4{
				fill:#c8c8c8;
				stroke:#342610;
				stroke-width:0.5px;
			}
			.style-5{
				fill:#f3f4f9;
				stroke:#342610;
				stroke-width:0.5px;
			}
			.text-style{
				letter-spacing: 0.05rem;
				font-size: 0.55rem;
				font-family:Tahoma;
				fill:#b59c30;
				stroke: #020824;
				stroke-width:0.02rem;
				filter:url(#shadow_1);
			}
			.text-style2{
				stroke-width:0.007rem;
				fill: #020824;
				font-size:0.5rem;
			}
		</style>
	</defs>
	<g>
		<path d='M0 0h28v28H0z'  stroke='none' fill='none' />
		<rect class='base-style style-1' x='.5' y='.5' width='27' height='27' rx='2.5'/>
		<g>
			<rect class='base-style style-4' x='2' y='2' width='24.0' height='24.0' rx='2' />
			
			
			<g>
				<line class='base-style style-2' x1='3.4' y1='3.4' x2='24.0' y2='24' />			
				<line class='base-style style-2' x1='24' y1='3.4' x2='3.4' y2='24' />			
